<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MaTodo" />
  <title>MaTodo</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --border: #2a2a3a;
      --accent: #c8f060;
      --accent2: #7b61ff;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --danger: #ff5f6d;
      --radius: 18px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* Background glow */
    .bg-glow {
      position: fixed;
      top: -120px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,97,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow2 {
      position: fixed;
      bottom: 80px;
      left: -100px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,96,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      padding: 52px 24px 20px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .app-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }
    .app-title span {
      color: var(--accent);
    }
    .date-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-bottom: 4px;
    }
    .stats-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .stat-pill b { color: var(--text); font-family: 'Syne', sans-serif; }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 0 24px 16px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d12;
      font-weight: 700;
    }

    /* Tasks list */
    .tasks-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .tasks-container::-webkit-scrollbar { display: none; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent2);
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .task-item:active { transform: scale(0.97); }

    .task-item.done { opacity: 0.5; }
    .task-item.done::before { background: var(--muted); opacity: 1; }
    .task-item.prio::before { opacity: 1; background: var(--accent); }

    .check-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1px;
    }
    .check-btn svg { opacity: 0; transition: opacity 0.2s; width: 14px; height: 14px; }
    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-item.done .check-btn svg { opacity: 1; }

    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text);
      word-break: break-word;
      transition: color 0.2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .task-date {
      font-size: 11px;
      color: var(--muted);
    }
    .tag-prio {
      background: rgba(200,240,96,0.12);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
    }

    .del-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: all 0.2s;
      flex-shrink: 0;
      opacity: 0.5;
    }
    .del-btn:active { color: var(--danger); opacity: 1; background: rgba(255,95,109,0.1); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
    }
    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-sub { font-size: 14px; line-height: 1.6; }

    /* Bottom sheet / add panel */
    .add-bar {
      padding: 12px 24px 28px;
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-color: var(--accent);
    }
    #task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      padding: 12px 0;
      caret-color: var(--accent);
    }
    #task-input::placeholder { color: var(--muted); }

    .prio-toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 20px;
      padding: 8px;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .prio-toggle.on { color: var(--accent); }

    .add-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .add-btn:active { transform: scale(0.9); }
    .add-btn svg { width: 22px; height: 22px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 100px;
      pointer-events: none;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <header>
    <div class="header-top">
      <h1 class="app-title">Ma<span>Todo</span></h1>
      <span class="date-label" id="date-label"></span>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><b id="stat-total">0</b> tâches</div>
      <div class="stat-pill"><b id="stat-done">0</b> faites</div>
      <div class="stat-pill"><b id="stat-prio">0</b> prioritaires</div>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">Toutes</button>
    <button class="filter-btn" onclick="setFilter('todo', this)">À faire</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Faites</button>
    <button class="filter-btn" onclick="setFilter('prio', this)">⚡ Prio</button>
  </div>

  <div class="tasks-container" id="tasks-list"></div>

  <div class="add-bar">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Nouvelle tâche…" maxlength="200" />
      <button class="prio-toggle" id="prio-btn" onclick="togglePrio()" title="Priorité">⚡</button>
      <button class="add-btn" onclick="addTask()">
        <svg fill="none" stroke="#0d0d12" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('matodo_tasks') || '[]');
  let isPrio = false;
  let filter = 'all';

  // ── Date ──────────────────────────────────────────────
  const jours = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const mois  = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const now = new Date();
  document.getElementById('date-label').textContent =
    `${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]}`;

  // ── Persist ──────────────────────────────────────────
  function save() {
    localStorage.setItem('matodo_tasks', JSON.stringify(tasks));
  }

  // ── Toast ────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Prio toggle ──────────────────────────────────────
  function togglePrio() {
    isPrio = !isPrio;
    document.getElementById('prio-btn').classList.toggle('on', isPrio);
  }

  // ── Add ──────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) { showToast('✏️ Écris une tâche d\'abord !'); return; }
    const task = {
      id: Date.now(),
      text,
      done: false,
      prio: isPrio,
      date: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
    };
    tasks.unshift(task);
    save();
    input.value = '';
    isPrio = false;
    document.getElementById('prio-btn').classList.remove('on');
    render();
    showToast('✅ Tâche ajoutée !');
  }

  // ── Toggle done ──────────────────────────────────────
  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    save();
    render();
    showToast(t.done ? '🎉 Tâche terminée !' : '↩️ Tâche réactivée');
  }

  // ── Delete ───────────────────────────────────────────
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
    showToast('🗑️ Supprimée');
  }

  // ── Filter ───────────────────────────────────────────
  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // ── Stats ────────────────────────────────────────────
  function updateStats() {
    document.getElementById('stat-total').textContent = tasks.length;
    document.getElementById('stat-done').textContent  = tasks.filter(t => t.done).length;
    document.getElementById('stat-prio').textContent  = tasks.filter(t => t.prio && !t.done).length;
  }

  // ── Render ───────────────────────────────────────────
  function render() {
    updateStats();
    const container = document.getElementById('tasks-list');
    let visible = tasks;
    if (filter === 'todo')  visible = tasks.filter(t => !t.done);
    if (filter === 'done')  visible = tasks.filter(t => t.done);
    if (filter === 'prio')  visible = tasks.filter(t => t.prio && !t.done);

    if (visible.length === 0) {
      const msgs = {
        all:  ['🌟','Tout propre !','Aucune tâche pour l\'instant.\nAjoute-en une ci-dessous.'],
        todo: ['✨','Rien à faire !','Toutes tes tâches sont terminées.'],
        done: ['🏆','Pas encore','Tu n\'as encore rien coché.'],
        prio: ['⚡','Zéro urgence','Aucune tâche prioritaire.']
      };
      const [icon, title, sub] = msgs[filter];
      container.innerHTML = `<div class="empty-state">
        <span class="empty-icon">${icon}</span>
        <div class="empty-title">${title}</div>
        <div class="empty-sub">${sub}</div>
      </div>`;
      return;
    }

    container.innerHTML = visible.map((t, i) => `
      <div class="task-item ${t.done ? 'done' : ''} ${t.prio && !t.done ? 'prio' : ''}"
           style="animation-delay:${i * 0.04}s"
           onclick="toggleDone(${t.id})">
        <button class="check-btn" onclick="event.stopPropagation(); toggleDone(${t.id})">
          <svg fill="none" stroke="#0d0d12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <div class="task-body">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="task-date">${t.date}</span>
            ${t.prio && !t.done ? '<span class="tag-prio">⚡ Priorité</span>' : ''}
          </div>
        </div>
        <button class="del-btn" onclick="event.stopPropagation(); deleteTask(${t.id})" title="Supprimer">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Enter key ────────────────────────────────────────
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── Init ─────────────────────────────────────────────
  render();

  // ── Service Worker registration ──────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
